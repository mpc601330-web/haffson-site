<!DOCTYPE html>
<html lang="{{ if hasPrefix .RelPermalink "/es/" }}es{{ else }}en{{ end }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .Title }}{{ .Title }} | {{ .Site.Title }}{{ else }}{{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ .Params.description | default .Site.Params.site_tagline }}">
    {{ with .Params.keywords }}<meta name="keywords" content="{{ delimit . ", " }}">{{ end }}
    <link rel="canonical" href="{{ .Permalink }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ .Params.description | default .Site.Params.site_tagline }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="/css/site.css">
    <meta name="google-site-verification" content="QBX9Zn1yb7OjtREjymOE8Z2ijMAudZbd-xR83AA7gv0" />
  </head>
  <body class="{{ if .Params.premium }}premium-page{{ end }}">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-brand" href="/">{{ .Site.Params.site_name | default .Site.Title }}</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/es/seguimiento-facturas-clientes/">ES</a>
          <div class="dropdown">
            <button class="dropbtn" type="button">Problems &#9662;</button>
            <div class="dropdown-content">
              {{ range .Site.RegularPages }}
                {{ if and (ne .File.BaseFileName "_index") (ne .File.BaseFileName "thanks") }}
                  <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                {{ end }}
              {{ end }}
            </div>
          </div>
        </nav>
      </div>
    </header>
    {{ block "main" . }}{{ end }}
    <script>
      document.querySelectorAll(".waitlist-form").forEach(form => {
        form.addEventListener("submit", async function(e) {
          e.preventDefault();

          const email = form.querySelector(".email-input").value;
          const source = form.dataset.source || window.location.pathname;

          try {
            await fetch("https://script.google.com/macros/s/AKfycbyjJ_n7xKZ3UFkfcM2raaMmjRNel6BA4k4mJgpuc3q_zTezDot0732q2MyUjGMTtOge7w/exec", {
              method: "POST",
              mode: "no-cors",
              body: JSON.stringify({
                email: email,
                source: source
              })
            });
          } catch (err) {
            console.error("Lead capture failed", err);
          }

          window.location.href = "/thanks/";
        });
      });
    </script>
  </body>
</html>
